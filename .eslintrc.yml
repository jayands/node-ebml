---
  env:
    browser: true
    node: true
  globals:
    Uint8Array: true
    DataView: true
    Buffer: true
    TextDecoder: true
  parserOptions:
    ecmaVersion: 6
    ecmaFeatures:
      scriptType: "module"
  extends: 'airbnb-base'
  rules:
    no-negated-in-lhs: "error"
    no-bitwise: "off"
    rest-spread-spacing: "error"

